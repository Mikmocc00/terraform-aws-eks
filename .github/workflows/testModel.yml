on: [push]
jobs:
  defect_prediction_job:
    runs-on: ubuntu-latest
    name: Run DEFUSE's model for Terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Defect Prediction
        id: defect_prediction
        uses: Mikmocc00/radon-defuse-action@v1
        with:
          model: 'D0UpNxkvWpzmIivLAZ8M'
          language: 'docker'
          url: 'https://gauzy-virgie-timbreled.ngrok-free.dev'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
